<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HiSpark 医院生命体征监测</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body data-view="desktop">
  <main class="app-shell">
    <header class="topbar clinical-topbar">
      <div class="brand clinical-brand">
        <span class="brand-mark">H</span>
        <div>
          <h1>HiSpark 医院生命体征监测</h1>
          <p>床位 bed01 生命体征看板</p>
        </div>
      </div>
      <span id="statusPill" class="status-pill offline"><i class="status-dot"></i><span id="statusText">未连接</span></span>
    </header>

    <section class="dashboard clinical-dashboard">
      <div class="patient-grid">
        <section class="panel patient-form-panel">
          <div class="panel-head compact-head">
            <div>
              <h2 class="panel-title">患者信息录入</h2>
              <p class="panel-subtitle">病区登记信息</p>
            </div>
            <span id="patientStatusText" class="form-status">等待录入</span>
          </div>
          <form id="patientForm" class="patient-form">
            <label class="field-label">病人姓名<input id="patientNameInput" type="text" maxlength="20" autocomplete="off" required></label>
            <label class="field-label">病历号<input id="patientRecordInput" type="text" maxlength="30" autocomplete="off" required></label>
            <label class="field-label">性别<select id="patientGenderInput" required><option value="">请选择</option><option value="male">male</option><option value="female">female</option></select></label>
            <label class="field-label">年龄<input id="patientAgeInput" type="number" min="0" max="130" inputmode="numeric" required></label>
            <label class="field-label">联系电话<input id="patientPhoneInput" type="tel" maxlength="24" autocomplete="off"></label>
            <label class="field-label wide-field">备注<textarea id="patientNoteInput" maxlength="60" rows="2"></textarea></label>
            <div class="form-actions wide-field">
              <button type="submit" class="primary-action">上传患者信息</button>
            </div>
          </form>
        </section>

        <section class="panel patient-summary-panel">
          <div class="panel-head compact-head">
            <div>
              <h2 class="panel-title">当前患者</h2>
              <p class="panel-subtitle">最新同步信息</p>
            </div>
            <span class="sync-badge">同步</span>
          </div>
          <div class="patient-summary">
            <div class="patient-primary"><span id="patientNameText">未登记</span><small id="patientRecordText">病历号 --</small></div>
            <div class="patient-detail-row"><span>性别</span><b id="patientGenderText">--</b></div>
            <div class="patient-detail-row"><span>年龄</span><b id="patientAgeText">--</b></div>
            <div class="patient-detail-row"><span>联系电话</span><b id="patientPhoneText">--</b></div>
            <div class="patient-note"><span>备注</span><b id="patientNoteText">--</b></div>
            <div class="patient-meta"><span>来源：<b id="patientSourceText">--</b></span><span>更新时间：<b id="patientUpdatedText">--</b></span></div>
          </div>
        </section>
      </div>

      <section class="panel vitals-panel">
        <div class="panel-head vitals-head">
          <div>
            <h2 class="panel-title">检测数据</h2>
            <p class="panel-subtitle">服务端云端遥测</p>
          </div>
          <div class="telemetry-meta">
            <span>设备 <b id="deviceIdText">--</b></span>
            <span>更新 <b id="lastUpdateText">--</b></span>
          </div>
        </div>

        <section class="metrics-grid" aria-label="生命体征检测数据">
          <article class="metric-card heart-card">
            <div class="metric-label"><span>心率</span><span class="metric-icon">HR</span></div>
            <div class="metric-value"><span id="heartRateValue">--</span><span class="metric-unit">bpm</span></div>
            <div class="metric-note">实时心率</div>
          </article>
          <article class="metric-card oxygen-card">
            <div class="metric-label"><span>血氧</span><span class="metric-icon">O2</span></div>
            <div class="metric-value"><span id="spo2Value">--</span><span class="metric-unit">%</span></div>
            <div class="metric-note">脉搏血氧</div>
          </article>
          <article class="metric-card micro-card">
            <div class="metric-label"><span>微循环</span><span class="metric-icon">MC</span></div>
            <div class="metric-value"><span id="microcirculationValue">--</span></div>
            <div class="metric-note">灌注指标</div>
          </article>
          <article class="metric-card pressure-card">
            <div class="metric-label"><span>收缩压</span><span class="metric-icon">SYS</span></div>
            <div class="metric-value"><span id="systolicBpValue">--</span><span class="metric-unit">mmHg</span></div>
            <div class="metric-note">高压</div>
          </article>
          <article class="metric-card pressure-card">
            <div class="metric-label"><span>舒张压</span><span class="metric-icon">DIA</span></div>
            <div class="metric-value"><span id="diastolicBpValue">--</span><span class="metric-unit">mmHg</span></div>
            <div class="metric-note">低压</div>
          </article>
          <article class="metric-card count-card">
            <div class="metric-label"><span>消息计数</span><span class="metric-icon">#</span></div>
            <div class="metric-value"><span id="messageCountText">0</span></div>
            <div class="metric-note">遥测接收</div>
          </article>
        </section>
      </section>
    </section>
  </main>
  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
  <script src="./dashboard.js"></script>
</body>
</html>
