<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>医院生命体征 H5</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body data-view="mobile">
  <main class="mobile-shell clinical-mobile-shell">
    <header class="mobile-header clinical-mobile-header">
      <div class="mobile-title">
        <h1>医院生命体征 H5</h1>
        <p>bed01 · EMQX 实时数据</p>
      </div>
      <span id="statusPill" class="status-pill offline"><i class="status-dot"></i><span id="statusText">未连接</span></span>
    </header>

    <section class="mobile-content">
      <article class="mobile-patient-card">
        <div class="mobile-card-head">
          <h2>患者信息</h2>
          <span id="patientStatusText" class="form-status">等待录入</span>
        </div>
        <form id="patientForm" class="patient-form mobile-patient-form">
          <label class="field-label">病人姓名<input id="patientNameInput" type="text" maxlength="20" autocomplete="off" required></label>
          <label class="field-label">病历号<input id="patientRecordInput" type="text" maxlength="30" autocomplete="off" required></label>
          <label class="field-label">性别<select id="patientGenderInput" required><option value="">请选择</option><option value="male">male</option><option value="female">female</option></select></label>
          <label class="field-label">年龄<input id="patientAgeInput" type="number" min="0" max="130" inputmode="numeric" required></label>
          <label class="field-label">联系电话<input id="patientPhoneInput" type="tel" maxlength="24" autocomplete="off"></label>
          <label class="field-label">备注<textarea id="patientNoteInput" maxlength="60" rows="2"></textarea></label>
          <button type="submit" class="primary-action">上传患者信息</button>
        </form>
        <div class="mobile-patient-summary">
          <strong id="patientNameText">未登记</strong>
          <span id="patientRecordText">病历号 --</span>
          <div><span id="patientGenderText">--</span><span id="patientAgeText">--</span><span id="patientPhoneText">--</span></div>
          <p id="patientNoteText">--</p>
          <small>来源 <b id="patientSourceText">--</b> · <b id="patientUpdatedText">--</b></small>
        </div>
      </article>

      <article class="mobile-wave-card">
        <div class="mobile-wave-top">
          <h2>心电</h2>
          <div><span id="ecgValue" class="mobile-ecg-number">--</span><span class="mobile-ecg-unit"> mV</span></div>
        </div>
        <canvas id="mobileWaveCanvas" aria-label="ECG waveform"></canvas>
        <div class="mobile-meta">
          <div><small>更新时间</small><b id="lastUpdateText">--</b></div>
          <div><small>设备</small><b id="deviceIdText">--</b></div>
        </div>
      </article>

      <article class="mobile-metric-card">
        <div class="mobile-metric-row"><span>心率</span><strong><span id="heartRateValue">--</span> <span>bpm</span></strong></div>
      </article>

      <article class="mobile-metric-card">
        <div class="mobile-metric-row"><span>血氧</span><strong><span id="spo2Value">--</span> <span>%</span></strong></div>
      </article>

      <article class="mobile-metric-card">
        <div class="mobile-metric-row"><span>质量</span><strong id="qualityText">--</strong></div>
      </article>

      <article class="mobile-raw-card">
        <h2>遥测消息</h2>
        <div class="mobile-meta">
          <div><small>Topic</small><b id="topicText">--</b></div>
          <div><small>计数</small><b id="messageCountText">0</b></div>
        </div>
        <pre id="rawPayload" class="raw-output">等待消息...</pre>
      </article>
    </section>
  </main>
  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
  <script src="./dashboard.js"></script>
</body>
</html>
