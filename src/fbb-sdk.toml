# fbb SDK manifest — read by hs-fbb-cli.
#
# Declares the SDK's identity and the chips it contains. It does NOT declare
# verbs: every verb (flash / monitor / create / list / ...) is implemented by
# hs-fbb-cli. The SDK only provides chip data — see each chip's
# build/config/target_config/<chip>/<chip>.json — plus build.py and templates.

[fbb-sdk]
schema_version = 1
sdk_name = "fbb_ws63"
sdk_version = "1.0.0"
# A SDK may host multiple chip families (e.g. fbb_bs2x has bs20/bs21e/bs22).
# Each chip's data lives at build/config/target_config/<chip>/<chip>.json.
chips = ["ws63"]
# `fbb build` forwards to this script; it is the one SDK-owned entry point.
legacy_entry = "build.py"

[examples]
# Roots scanned by `fbb create-project-from-example` and `fbb list-examples`.
# Every sub-directory containing a CMakeLists.txt is a clonable example.
roots = [
    "application/samples/peripheral",
    "application/samples/bt/ble",
    "application/samples/bt/sle",
    "application/samples/bt/sle_chba",
]

[output]
build_dir = "output"
